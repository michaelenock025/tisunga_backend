# docker-compose.yml
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tisunga_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tisunga_db
      POSTGRES_USER: tisunga_user
      POSTGRES_PASSWORD: tisunga_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tisunga_user -d tisunga_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tisunga_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: production
    container_name: tisunga_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://tisunga_user:tisunga_pass@postgres:5432/tisunga_db
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs

  migrate:
    build:
      context: .
      target: builder
    container_name: tisunga_migrate
    env_file: .env
    environment:
      DATABASE_URL: postgresql://tisunga_user:tisunga_pass@postgres:5432/tisunga_db
    command: >
      sh -c "npx prisma migrate deploy && node prisma/seed.js"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

volumes:
  postgres_data:
  redis_data:
